<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Creepster&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Creepster&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <title>AI movie generator</title>
  </head>
  <header>
    <img src="" alt="" />
    <h1>
      <div class="first-line">Horror movie</div>
      <div class="second-line">AI generator</div>
    </h1>
    <p>Describe a horror movie and AI will find the best match</p>
  </header>
  <body>
    <form>
      <input
        class="text"
        type="text"
        placeholder="💀 e.g. Nicole Kidman, ghosts, apocalypse, psychological horror"
        autofocus
        required
        autocomplete="off"
        id="user-input"
      />
      <input class="submit" type="submit" value="GENERATE →" />
    </form>

    <div class="AI-answer hidden" id="AI-answer">
      <span class="loader">⏳</span>
    </div>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <script src="src/index.js"></script>

    <footer>
      <hr />
      Coded by
      <a href="https://github.com/krispaje" target="_blank"
        >Kristina Pajėdienė</a
      >
      <br />
      Open-source on
      <a
        href="https://github.com/krispaje/horror-movie-generator"
        target="_blank"
        >GitHub</a
      >
      Hosted by
      <a href="https://horror-movie-generator.netlify.app" target="_blank"
        >Netlify</a
      >
    </footer>
  </body>
</html>
