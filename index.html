<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Creepster&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    />
    <title>AI movie generator</title>
  </head>
  <header>
    <img src="" alt="" />
    <h1>
      <div class="first-line">Horror movie</div>
      <div class="second-line">AI generator</div>
    </h1>
    <p>Enter movie idea and let AI find you the best match</p>
  </header>
  <body>
    <form>
      <input
        class="text"
        type="text"
        placeholder="💀 What kind of horror movie do you want?"
        autofocus
        required
        autocomplete="off"
      />
      <input class="submit" type="submit" value="GENERATE →" />
    </form>
    <script src="src/index.js"></script>
  </body>
